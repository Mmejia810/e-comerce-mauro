<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Carrito de Compras</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="cartItems.length > 0; else emptyCart">
    <ion-item *ngFor="let item of cartItems">
      <ion-thumbnail slot="start">
        <img [src]="item.image" alt="{{ item.title }}" />
      </ion-thumbnail>
      <ion-label>
        <h2>{{ item.title }}</h2>
        <p>Precio: ${{ item.price | number:'1.2-2' }}</p>
        <p>Total: ${{ (item.price * item.quantity) | number:'1.2-2' }}</p>
      </ion-label>
      <ion-button (click)="updateQuantity(item.id, item.quantity - 1)" fill="outline">-</ion-button>
      <ion-input [(ngModel)]="item.quantity" (ionBlur)="updateQuantity(item.id, item.quantity)" type="number"></ion-input>
      <ion-button (click)="updateQuantity(item.id, item.quantity + 1)" fill="outline">+</ion-button>
      <ion-button color="danger" (click)="removeItem(item.id)">🗑</ion-button>
    </ion-item>
  </ion-list>

  <ng-template #emptyCart>
    <p class="empty-text">El carrito está vacío.</p>
  </ng-template>

  <div class="cart-footer">
    <h2>Total: ${{ getTotal() | number:'1.2-2' }}</h2>
    <ion-button expand="full" color="success" (click)="clearCart()">Vaciar Carrito</ion-button>
    <ion-button expand="full" color="primary" (click)="goToCheckout()">Comprar</ion-button>
  </div>
</ion-content>
